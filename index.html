<!DOCTYPE html><script type="application/json" id="cowork-artifact-meta">
{
  "name": "Panel Ventas Jecel Drive",
  "schemaVersion": 1
}
</script>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Ventas — Grupo Jecel C.A.</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #f0883e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  header h1 { font-size: 1.2rem; font-weight: 600; color: var(--text); }
  header .badge { background: var(--border); color: var(--muted); font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; }

  .container { max-width: 1280px; margin: 0 auto; padding: 24px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .kpi-card .label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .kpi-card .value { font-size: 1.8rem; font-weight: 700; color: var(--text); line-height: 1; }
  .kpi-card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }
  .kpi-card.highlight { border-color: var(--accent); }

  .progress-bar { width: 100%; height: 8px; background: var(--border); border-radius: 4px; margin-top: 10px; overflow: hidden; }
  .progress-bar .fill { height: 100%; border-radius: 4px; }
  .fill-yellow { background: var(--yellow); }
  .fill-green { background: var(--green); }
  .fill-red { background: var(--red); }

  .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .chart-card h2 { font-size: 0.9rem; font-weight: 600; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
  .chart-wrap { position: relative; height: 240px; }

  .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

  .section-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .section-card h2 { font-size: 0.9rem; font-weight: 600; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }

  .vendor-row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .vendor-name { font-size: 0.85rem; width: 160px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vendor-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .vendor-bar { height: 100%; border-radius: 3px; background: var(--accent); }
  .vendor-amt { font-size: 0.82rem; color: var(--muted); width: 90px; text-align: right; flex-shrink: 0; }
  .vendor-sub { font-size: 0.75rem; color: #8b949e; margin-bottom: 14px; padding-left: 0; }

  .client-row { margin-bottom: 14px; }
  .client-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .client-name { font-size: 0.82rem; color: var(--text); }
  .client-amt { font-size: 0.82rem; color: var(--accent); font-weight: 600; }
  .client-bar-wrap { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .client-bar { height: 100%; border-radius: 3px; background: var(--green); }

  table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  th { color: var(--muted); font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .ref { color: var(--accent); font-weight: 600; }
  .amt { color: var(--green); font-weight: 600; text-align: right; }

  footer { text-align: center; padding: 20px; color: var(--muted); font-size: 0.78rem; border-top: 1px solid var(--border); }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 900px) {
    .charts-grid, .bottom-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <h1>📊 Panel de Ventas — Grupo Jecel C.A.</h1>
  <span class="badge" id="update-badge">Cargando...</span>
</header>

<div class="container">
  <div class="kpi-grid" id="kpi-grid"></div>

  <div class="charts-grid">
    <div class="chart-card">
      <h2>Ventas por Mes — 2026</h2>
      <div class="chart-wrap"><canvas id="barChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h2>Distribución por Vendedor (MTD)</h2>
      <div class="chart-wrap"><canvas id="donutChart"></canvas></div>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="section-card">
      <h2>Top Vendedores — Mes Actual</h2>
      <div id="vendedores-list"></div>
    </div>
    <div class="section-card">
      <h2>Top Clientes — Mes Actual</h2>
      <div id="clientes-list"></div>
    </div>
  </div>

  <div class="section-card" style="margin-bottom:24px;">
    <h2>Últimas 10 Órdenes</h2>
    <table>
      <thead>
        <tr>
          <th>Ref.</th>
          <th>Fecha</th>
          <th>Cliente</th>
          <th>Vendedor</th>
          <th style="text-align:right">Total</th>
        </tr>
      </thead>
      <tbody id="orders-body"></tbody>
    </table>
  </div>
</div>

<footer>
  Actualización automática diaria · Grupo Jecel C.A. ·
  <a href="https://grupojecel-claude.github.io/jecel-dashboard/" target="_blank">Ver en línea ↗</a>
  <br><span id="footer-ts"></span>
</footer>

<script>
const D = {"ytd_total":936446.19,"ytd_ordenes":616,"mtd_total":133248.2,"mtd_ordenes":75,"progreso_pct":44.4,"faltante":166751.8,"ticket_promedio":1776.64,"top_vendedores":[{"nombre":"JORGE CORONADO","total":90360.34,"n_ordenes":39},{"nombre":"JONAS CORONADO","total":29907.39,"n_ordenes":24},{"nombre":"GUILLERMINA DELGADO","total":12885.97,"n_ordenes":11},{"nombre":"JECEL MIAMI","total":94.5,"n_ordenes":1}],"top_clientes":[{"nombre":"MULTIMAX STORE, C.A.","total":16638.0},{"nombre":"ALCAVE, CA","total":15582.4},{"nombre":"STARMOVILES TELECOM SERVICE, C.A","total":10040.43}],"ultima_orden":{"ref":"S00715","fecha":"18/06/2026","cliente":"EXITOS 3, C.A.","vendedor":"JORGE CORONADO","total":434.71},"meses_labels":["2026-01","2026-02","2026-03","2026-04","2026-05","2026-06"],"meses_vals":[156579.58,110045.46,231616.66,146310.81,158645.48,133248.2],"vend_labels":["JORGE CORONADO","JONAS CORONADO","GUILLERMINA DELGADO","JECEL MIAMI"],"vend_vals":[90360.34,29907.39,12885.97,94.5],"ultimas10":[{"ref":"S00715","fecha":"18/06/2026","cliente":"EXITOS 3, C.A.","vendedor":"JORGE CORONADO","total":434.71},{"ref":"S00714","fecha":"18/06/2026","cliente":"CONSORCIO LUX, S.A., ACTIVO FIJO","vendedor":"JORGE CORONADO","total":809.0},{"ref":"S00713","fecha":"18/06/2026","cliente":"ELECTRO DIGITAL IMPORT,C.A.","vendedor":"JORGE CORONADO","total":679.2},{"ref":"S00711","fecha":"18/06/2026","cliente":"CRISTYN MARCEL PEREZ RICO","vendedor":"GUILLERMINA DELGADO","total":2214.22},{"ref":"S00710","fecha":"18/06/2026","cliente":"JX CELULAR, C.A","vendedor":"JORGE CORONADO","total":2219.83},{"ref":"S00709","fecha":"18/06/2026","cliente":"UELECTRONICA, C.A.","vendedor":"GUILLERMINA DELGADO","total":739.5},{"ref":"S00708","fecha":"18/06/2026","cliente":"STARMOVILES TELECOM SERVICE, C.A","vendedor":"JORGE CORONADO","total":1070.01},{"ref":"S00707","fecha":"18/06/2026","cliente":"GUIDEMOVIL,CA","vendedor":"GUILLERMINA DELGADO","total":103.43},{"ref":"S00705","fecha":"17/06/2026","cliente":"DOCTOR CELULAR RECARGADO C.A","vendedor":"JORGE CORONADO","total":2335.8},{"ref":"S00704","fecha":"17/06/2026","cliente":"TELE CELL MAX C.A.","vendedor":"JORGE CORONADO","total":2052.5}],"fecha_actualizacion":"19/06/2026 08:00"};

function fmt(n, d=2) { return n.toLocaleString('es-VE', {minimumFractionDigits:d, maximumFractionDigits:d}); }
function fmtUSD(n, d=2) { return '$' + fmt(n, d); }
function semaforo(p) { return p>=80?'🟢':p>=40?'🟡':'🔴'; }
function fillClass(p) { return p>=80?'fill-green':p>=40?'fill-yellow':'fill-red'; }

// KPI Cards
const kpis = [
  { label: `Meta Mensual · ${semaforo(D.progreso_pct)} ${D.progreso_pct}% alcanzado`, value: '$300.000', sub: `Faltan ${fmtUSD(D.faltante, 0)} para la meta`, progress: D.progreso_pct, highlight: true },
  { label: 'Ventas MTD', value: fmtUSD(D.mtd_total), sub: `${D.mtd_ordenes} órdenes este mes` },
  { label: 'Ventas YTD', value: fmtUSD(D.ytd_total), sub: `${D.ytd_ordenes} órdenes en 2026` },
  { label: 'Ticket Promedio MTD', value: fmtUSD(D.ticket_promedio), sub: 'Por orden este mes' }
];
const grid = document.getElementById('kpi-grid');
kpis.forEach(k => {
  const c = document.createElement('div');
  c.className = 'kpi-card' + (k.highlight ? ' highlight' : '');
  c.innerHTML = `<div class="label">${k.label}</div><div class="value">${k.value}</div><div class="sub">${k.sub}</div>${k.progress!=null?`<div class="progress-bar"><div class="fill ${fillClass(k.progress)}" style="width:${k.progress}%"></div></div>`:''}`;
  grid.appendChild(c);
});

// Bar chart
const mNames = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
new Chart(document.getElementById('barChart'), {
  type: 'bar',
  data: {
    labels: D.meses_labels.map(m => mNames[parseInt(m.split('-')[1])-1]),
    datasets: [{ label: 'Ventas USD', data: D.meses_vals,
      backgroundColor: D.meses_vals.map((_,i) => i===D.meses_vals.length-1?'#f0883e':'#58a6ff'),
      borderRadius: 5, borderSkipped: false }]
  },
  options: { responsive:true, maintainAspectRatio:false,
    plugins: { legend:{display:false}, tooltip:{callbacks:{label:c=>' $'+fmt(c.raw,0)}} },
    scales: { x:{grid:{color:'#30363d'},ticks:{color:'#8b949e'}}, y:{grid:{color:'#30363d'},ticks:{color:'#8b949e',callback:v=>'$'+(v/1000).toFixed(0)+'K'}} }
  }
});

// Donut chart
new Chart(document.getElementById('donutChart'), {
  type: 'doughnut',
  data: { labels: D.vend_labels, datasets: [{ data: D.vend_vals,
    backgroundColor:['#58a6ff','#3fb950','#d29922','#f85149'], borderWidth:2, borderColor:'#161b22' }] },
  options: { responsive:true, maintainAspectRatio:false, cutout:'65%',
    plugins: { legend:{position:'bottom',labels:{color:'#8b949e',boxWidth:12,padding:10,font:{size:11}}},
      tooltip:{callbacks:{label:c=>' $'+fmt(c.raw,0)}} } }
});

// Vendedores
const maxV = D.top_vendedores[0]?.total||1;
const vl = document.getElementById('vendedores-list');
D.top_vendedores.forEach(v => {
  const pct = (v.total/maxV*100).toFixed(1);
  const nm = v.nombre.split(' ').slice(0,2).join(' ');
  vl.innerHTML += `<div class="vendor-row"><div class="vendor-name">${nm}</div><div class="vendor-bar-wrap"><div class="vendor-bar" style="width:${pct}%"></div></div><div class="vendor-amt">${fmtUSD(v.total,0)}</div></div><div class="vendor-sub">${v.n_ordenes} órdenes</div>`;
});

// Clientes
const maxC = D.top_clientes[0]?.total||1;
const cl = document.getElementById('clientes-list');
D.top_clientes.forEach(c => {
  const pct = (c.total/maxC*100).toFixed(1);
  const nm = c.nombre.length>32?c.nombre.substring(0,32)+'…':c.nombre;
  cl.innerHTML += `<div class="client-row"><div class="client-header"><span class="client-name">${nm}</span><span class="client-amt">${fmtUSD(c.total,0)}</span></div><div class="client-bar-wrap"><div class="client-bar" style="width:${pct}%"></div></div></div>`;
});

// Orders table
const tb = document.getElementById('orders-body');
D.ultimas10.forEach(o => {
  const vn = o.vendedor.split(' ')[0];
  const cn = o.cliente.length>28?o.cliente.substring(0,28)+'…':o.cliente;
  tb.innerHTML += `<tr><td class="ref">${o.ref}</td><td>${o.fecha}</td><td>${cn}</td><td>${vn}</td><td class="amt">${fmtUSD(o.total)}</td></tr>`;
});

document.getElementById('update-badge').textContent = 'Actualizado: ' + D.fecha_actualizacion;
document.getElementById('footer-ts').textContent = 'Última actualización automática: ' + D.fecha_actualizacion + ' hora Venezuela';
</script>
</body>
</html>
