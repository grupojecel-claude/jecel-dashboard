<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ventas — Grupo Jecel C.A.</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #1c2128;
  --surface3: #21262d;
  --border:   #30363d;
  --text:     #e6edf3;
  --text2:    #8b949e;
  --accent:   #3b82f6;
  --green:    #3fb950;
  --yellow:   #d29922;
  --red:      #f85149;
  --purple:   #bc8cff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;font-size:14px}

/* ── Header ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.header-left{display:flex;align-items:center;gap:14px}
.header h1{font-size:1.15rem;font-weight:700;color:var(--text);letter-spacing:-.01em}
.header-sub{font-size:.72rem;color:var(--text2);margin-top:2px}
.meta-badge{background:#1a3a5c;border:1px solid var(--accent);color:var(--accent);border-radius:20px;padding:5px 14px;font-size:.75rem;font-weight:600;white-space:nowrap}

/* ── Layout ── */
.container{max-width:1500px;margin:0 auto;padding:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.grid-mid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:16px}
.grid-bot{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.section-title{font-size:.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:6px}

/* ── KPI ── */
.kpi-label{font-size:.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.kpi-icon{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}
.kpi-value{font-size:1.65rem;font-weight:700;line-height:1.1;margin-bottom:2px}
.kpi-sub{font-size:.72rem;color:var(--text2);margin-top:4px}
.progress-wrap{background:var(--surface3);border-radius:20px;height:6px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px}

/* ── Chart ── */
.chart-wrap{position:relative;height:260px}

/* ── Vendor ranking (MTD & YTD) ── */
.vend-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.vend-item:last-child{border-bottom:none}
.vend-rank{width:26px;height:26px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;margin-top:1px}
.vend-body{flex:1;min-width:0}
.vend-name{font-size:.82rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vend-meta{font-size:.69rem;color:var(--text2);margin-top:2px}
.vend-right{text-align:right;flex-shrink:0}
.vend-amount{font-size:.85rem;font-weight:700;white-space:nowrap}
.vend-pct-label{font-size:.72rem;color:var(--text2);margin-top:2px}
.vend-bar-wrap{background:var(--surface3);border-radius:3px;height:3px;margin-top:5px;overflow:hidden}
.vend-bar-fill{height:100%;border-radius:3px}

/* ── Client list ── */
.client-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.client-rank{font-size:.72rem;font-weight:700;color:var(--text2);width:18px;flex-shrink:0;text-align:right}
.client-name{font-size:.78rem;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-bar-wrap{width:160px;background:var(--surface3);border-radius:3px;height:8px;flex-shrink:0;overflow:hidden}
.client-bar-fill{height:100%;background:var(--accent);border-radius:3px}
.client-amount{font-size:.78rem;font-weight:600;color:var(--text);white-space:nowrap;text-align:right;min-width:80px}

@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-mid,.grid-bot{grid-template-columns:1fr}}
</style>
</head>
